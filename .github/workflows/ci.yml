name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (auth)
        # The generated apis/* packages have no tests (tests are skipped at
        # generation time). Only the hand-written auth package has a test
        # suite; it runs against httptest servers so no network is needed.
        run: go test ./auth/... -race -count=1 -timeout 60s
